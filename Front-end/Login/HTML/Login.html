<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar</title>
    <link rel="stylesheet" href="../CSS/Login_geral.css" media="all">
    <link rel="stylesheet" href="../CSS/Login_retrato.css" media="screen and (orientation: portrait)">
    <link rel="stylesheet" href="../CSS/Login_paisagem.css" media="screen and (orientation: landscape)">
    <link rel="shortcut icon" href="../../Imagens/icone.ico" type="image/x-icon">
</head>
<body>
    <!-- Tela de login -->  
    <header>
        <img src="../../Imagens/Logo.png" alt="Logo da Dogtor">
        <h1>Tela de Login</h1>
    </header>

    <main>
        <section id="login">
            <h2>Entrar</h2>
            <p>Acesse sua conta</p>

            <form action="#" method="post">
                <input type="text" id="usuario" placeholder="Usuario">
                <input type="password" id="senha" placeholder="••••••••">

                <label for="exibir_senha">
                    <input type="checkbox" name="exibir" id="exibir_senha">
                    Exibir senha
                </label>

                <button type="submit">Confirmar</button>
            </form>
        </section>

        <section id="register">
            <a href="../HTML/Register.html">Sem conta? clique para criar</a>
        </section>
    </main>

    <script src="../JavaScript/script.js"></script>
</body>
</html>
